<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>UTOM | Secure Access</title>
    <!-- Font Awesome 6 (professional icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* main container - perfect for phones */
        .app-container {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* LOGO area - NOT floating: no hover animation, no shadow movement, just static */
        .logo-area {
            text-align: center;
            animation: fadeSlideDown 0.5s ease-out;
            width: 100%;
        }
        .logo-img {
            max-width: 200px;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            /* no floating effect: remove drop-shadow that moves, remove transform on hover */
            filter: none;
            transition: none;
        }
        /* fallback text style if image missing */
        .logo-placeholder {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #000 30%, #F5B042 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* main card — clean white, soft radius, no excess shadow */
        .form-card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0,0,0,0.02);
            width: 100%;
            padding: 1.8rem 1.5rem 2rem;
            transition: all 0.2s ease;
        }

        /* forms wrapper */
        .form-wrapper {
            width: 100%;
        }

        .form-panel {
            transition: opacity 0.2s ease;
        }
        .hidden-panel {
            display: none;
        }

        /* pill-shaped input groups with icons */
        .input-icon-group {
            position: relative;
            width: 100%;
            margin-bottom: 1.2rem;
        }
        .input-icon-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 1.1rem;
            pointer-events: none;
            transition: color 0.2s;
        }
        .pill-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            font-size: 1rem;
            border: 1.5px solid #e9e9ef;
            border-radius: 999px;
            background: #ffffff;
            outline: none;
            transition: all 0.2s ease;
            color: #111;
            font-weight: 500;
        }
        .pill-input:focus {
            border-color: #F5B042;
            box-shadow: 0 0 0 3px rgba(245, 176, 66, 0.2);
        }
        .pill-input:focus + i {
            color: #F5B042;
        }
        /* for password toggle (optional eye) but we keep simple */
        .no-icon-padding {
            padding-left: 20px;
        }
        /* double column for name fields */
        .double-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .double-row .input-icon-group {
            flex: 1;
            min-width: 120px;
        }

        /* floating buttons - yellow & black style, subtle hover lift but not floating (controlled) */
        .btn-yellow-black {
            background: #F5B042;
            border: none;
            color: #000000;
            font-weight: 700;
            font-size: 1rem;
            padding: 14px 20px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-yellow-black:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
            background: #ffb84d;
        }
        .btn-yellow-black:active {
            transform: translateY(1px);
        }

        .btn-outline-dark {
            background: transparent;
            border: 2px solid #000000;
            color: #000;
            box-shadow: none;
        }
        .btn-outline-dark:hover {
            background: #00000008;
            transform: translateY(-2px);
        }

        .text-link {
            background: none;
            border: none;
            color: #000;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.85rem;
            transition: color 0.2s;
            padding: 6px 10px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .text-link i {
            font-size: 0.8rem;
        }
        .text-link:hover {
            color: #F5B042;
            text-decoration: none;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* terms & checkbox styling */
        .terms-check {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1rem 0 1.5rem;
            flex-wrap: wrap;
        }
        .terms-check label {
            font-size: 0.85rem;
            color: #2c2c2c;
            font-weight: 500;
        }
        .checkbox-custom {
            width: 18px;
            height: 18px;
            accent-color: #F5B042;
            cursor: pointer;
        }

        hr {
            margin: 1rem 0;
            border: none;
            height: 1px;
            background: #ececec;
        }

        /* forgot password modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
            padding: 1rem;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            background: white;
            max-width: 440px;
            width: 100%;
            border-radius: 44px;
            padding: 1.8rem;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2);
            transform: scale(0.96);
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .modal-overlay.active .modal-container {
            transform: scale(1);
        }
        .modal-container h3 {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-container p {
            color: #5a5a5a;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 1.2rem;
        }
        .modal-buttons button {
            flex: 1;
        }

        /* animation keyframes */
        @keyframes fadeSlideDown {
            0% {
                opacity: 0;
                transform: translateY(-12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* PERFECT MOBILE FIT */
        @media (max-width: 500px) {
            body {
                padding: 0.8rem;
                align-items: flex-start;
                padding-top: 1.8rem;
            }
            .form-card {
                padding: 1.4rem 1.2rem 1.6rem;
                border-radius: 32px;
            }
            .btn-yellow-black {
                padding: 12px 16px;
                font-size: 0.95rem;
            }
            .logo-img {
                max-width: 150px;
            }
            .pill-input {
                padding: 12px 16px 12px 44px;
                font-size: 0.95rem;
            }
            .input-icon-group i {
                left: 16px;
                font-size: 1rem;
            }
            .double-row {
                gap: 0.6rem;
            }
            .modal-container {
                padding: 1.5rem;
            }
            .modal-container h3 {
                font-size: 1.5rem;
            }
        }

        /* extra small devices */
        @media (max-width: 380px) {
            .flex-between {
                flex-direction: column;
                align-items: stretch;
            }
            .text-link {
                justify-content: center;
            }
        }

        .small-text {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.25rem;
            color: #7a7a7a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .error-msg {
            color: #d9534f;
            font-size: 0.7rem;
            margin-left: 20px;
            margin-top: 2px;
        }
        i.fa, i.far, i.fas {
            pointer-events: none;
        }
        /* remove extra spacing */
        button:active {
            outline: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- BIG LOGO on top: utom.png - NOT floating, static -->
    <div class="logo-area">
        <img src="utom.png" alt="UTOM official logo" class="logo-img" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'logo-placeholder\'><i class=\'fas fa-bolt\' style=\'margin-right:8px;\'></i>UTOM</div>';">
    </div>

    <!-- main card with dynamic forms -->
    <div class="form-card">
        <!-- LOGIN FORM PANEL -->
        <div id="loginPanel" class="form-panel">
            <form id="loginForm" action="javascript:void(0);">
                <div class="input-icon-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" class="pill-input" placeholder="Email address" autocomplete="email" required>
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" class="pill-input" placeholder="Password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-yellow-black" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> LOGIN</button>
                <div class="flex-between">
                    <button type="button" id="showSignupFromLoginBtn" class="btn-yellow-black btn-outline-dark" style="width: auto; padding: 10px 18px;"><i class="fas fa-user-plus"></i> CREATE ACCOUNT</button>
                    <button type="button" id="forgotPwdBtn" class="text-link"><i class="fas fa-key"></i> Forgot password?</button>
                </div>
            </form>
        </div>

        <!-- SIGNUP / REGISTER FORM PANEL (hidden initially) -->
        <div id="signupPanel" class="form-panel hidden-panel">
            <form id="signupForm" action="javascript:void(0);">
                <div class="double-row">
                    <div class="input-icon-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="firstName" class="pill-input" placeholder="First name" required>
                    </div>
                    <div class="input-icon-group">
                        <i class="fas fa-user-tag"></i>
                        <input type="text" id="lastName" class="pill-input" placeholder="Last name" required>
                    </div>
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-phone-alt"></i>
                    <input type="tel" id="phoneNumber" class="pill-input" placeholder="Phone number" required>
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" class="pill-input" placeholder="Email address" required>
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" class="pill-input" placeholder="Create password" required>
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirmPassword" class="pill-input" placeholder="Confirm password" required>
                </div>
                <div class="terms-check">
                    <input type="checkbox" id="termsCheckbox" class="checkbox-custom">
                    <label for="termsCheckbox">I agree to the <strong>Terms & Conditions</strong> and Privacy Policy.</label>
                </div>
                <button type="submit" class="btn-yellow-black" id="registerBtn"><i class="fas fa-user-check"></i> REGISTER</button>
                <div class="flex-between" style="margin-top: 0.8rem;">
                    <button type="button" id="backToLoginBtn" class="text-link"><i class="fas fa-chevron-left"></i> Back to Login</button>
                </div>
            </form>
        </div>
    </div>
    <div class="small-text"><i class="fas fa-shield-alt"></i> secure & seamless · 24/7 support</div>
</div>

<!-- FORGOT PASSWORD MODAL (email to send reset link) -->
<div id="forgotModal" class="modal-overlay">
    <div class="modal-container">
        <h3><i class="fas fa-paper-plane" style="color:#F5B042;"></i> Reset password</h3>
        <p>Enter your email address and we’ll send you a secure link to reset your password.</p>
        <div class="input-icon-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="resetEmailInput" class="pill-input" placeholder="Your email address" autocomplete="email">
        </div>
        <div class="modal-buttons">
            <button id="closeModalBtn" class="btn-yellow-black btn-outline-dark" style="background:transparent;"><i class="fas fa-times"></i> Cancel</button>
            <button id="sendResetLinkBtn" class="btn-yellow-black"><i class="fas fa-paper-plane"></i> Send link</button>
        </div>
    </div>
</div>

<script>
    // DOM elements
    const loginPanel = document.getElementById('loginPanel');
    const signupPanel = document.getElementById('signupPanel');
    const showSignupFromLogin = document.getElementById('showSignupFromLoginBtn');
    const backToLoginBtn = document.getElementById('backToLoginBtn');
    const forgotPwdBtn = document.getElementById('forgotPwdBtn');
    const forgotModal = document.getElementById('forgotModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const sendResetLinkBtn = document.getElementById('sendResetLinkBtn');
    const resetEmailInput = document.getElementById('resetEmailInput');

    // Signup fields
    const firstNameInput = document.getElementById('firstName');
    const lastNameInput = document.getElementById('lastName');
    const phoneInput = document.getElementById('phoneNumber');
    const signupEmailInput = document.getElementById('signupEmail');
    const signupPasswordInput = document.getElementById('signupPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const termsCheckbox = document.getElementById('termsCheckbox');
    
    // Login fields
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');

    // Helper: switch panels with clean transition
    function showLoginPanel() {
        loginPanel.classList.remove('hidden-panel');
        signupPanel.classList.add('hidden-panel');
    }
    function showSignupPanel() {
        signupPanel.classList.remove('hidden-panel');
        loginPanel.classList.add('hidden-panel');
    }

    // Toggle panels
    showSignupFromLogin.addEventListener('click', () => showSignupPanel());
    backToLoginBtn.addEventListener('click', () => showLoginPanel());

    // ----- LOGIN simulation -----
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();
        if (!email) {
            alert("📧 Please enter your email address.");
            loginEmail.focus();
            return;
        }
        if (!password) {
            alert("🔒 Please enter your password.");
            loginPassword.focus();
            return;
        }
        if (!email.includes('@') || !email.includes('.')) {
            alert("Please enter a valid email address (e.g., name@domain.com).");
            loginEmail.focus();
            return;
        }
        // demo success
        alert(`✅ Welcome back, ${email}! (Demo login successful — dashboard would open.)`);
    });

    // ----- SIGNUP with full validation and professional feedback -----
    document.getElementById('signupForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const firstName = firstNameInput.value.trim();
        const lastName = lastNameInput.value.trim();
        const phone = phoneInput.value.trim();
        const email = signupEmailInput.value.trim();
        const pwd = signupPasswordInput.value;
        const confirmPwd = confirmPasswordInput.value;
        const termsAccepted = termsCheckbox.checked;

        if (!firstName) {
            alert("❌ First name is required.");
            firstNameInput.focus();
            return;
        }
        if (!lastName) {
            alert("❌ Last name is required.");
            lastNameInput.focus();
            return;
        }
        if (!phone) {
            alert("📞 Phone number is required.");
            phoneInput.focus();
            return;
        }
        if (!email) {
            alert("📧 Email address is required.");
            signupEmailInput.focus();
            return;
        }
        if (!email.includes('@') || !email.includes('.')) {
            alert("Please enter a valid email (example@domain.com).");
            signupEmailInput.focus();
            return;
        }
        if (!pwd) {
            alert("🔐 Please create a password.");
            signupPasswordInput.focus();
            return;
        }
        if (pwd.length < 6) {
            alert("Password must be at least 6 characters long.");
            signupPasswordInput.focus();
            return;
        }
        if (pwd !== confirmPwd) {
            alert("⚠️ Passwords do not match. Please confirm your password.");
            confirmPasswordInput.focus();
            return;
        }
        if (!termsAccepted) {
            alert("📜 You must accept the Terms & Conditions to create an account.");
            termsCheckbox.focus();
            return;
        }

        // success simulation
        alert(`🎉 Account successfully created!\nWelcome ${firstName} ${lastName}.\nWe've sent a verification to ${email} (demo mode).`);
        // Reset signup form
        firstNameInput.value = '';
        lastNameInput.value = '';
        phoneInput.value = '';
        signupEmailInput.value = '';
        signupPasswordInput.value = '';
        confirmPasswordInput.value = '';
        termsCheckbox.checked = false;
        // switch to login panel and optionally prefill email
        showLoginPanel();
        if (email) loginEmail.value = email;
    });

    // ---------- FORGOT PASSWORD MODAL (email to send reset link) ----------
    function openForgotModal() {
        resetEmailInput.value = '';
        forgotModal.classList.add('active');
    }
    function closeForgotModal() {
        forgotModal.classList.remove('active');
    }
    forgotPwdBtn.addEventListener('click', openForgotModal);
    closeModalBtn.addEventListener('click', closeForgotModal);
    // close on background click
    forgotModal.addEventListener('click', (e) => {
        if (e.target === forgotModal) closeForgotModal();
    });

    // send reset link - matches requirement: enter email to send link
    sendResetLinkBtn.addEventListener('click', () => {
        const userEmail = resetEmailInput.value.trim();
        if (!userEmail) {
            alert("📧 Please enter your email address to receive the password reset link.");
            resetEmailInput.focus();
            return;
        }
        if (!userEmail.includes('@') || !userEmail.includes('.')) {
            alert("⚠️ Please enter a valid email address.");
            resetEmailInput.focus();
            return;
        }
        // simulation of sending link
        alert(`🔗 Password reset link has been sent to ${userEmail}.\n(Check your inbox — demo mode, link valid for 1 hour.)`);
        closeForgotModal();
        // prefill login email for convenience
        loginEmail.value = userEmail;
        showLoginPanel();
    });

    // close modal on escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && forgotModal.classList.contains('active')) {
            closeForgotModal();
        }
    });

    // subtle card entrance
    document.querySelector('.form-card').style.animation = 'fadeSlideDown 0.4s ease-out';
    
    // Ensure logo is absolutely static (no floating) - already removed hover transform and shadow
    // Also fix for any touch interactions
    const logoImg = document.querySelector('.logo-img');
    if (logoImg) {
        logoImg.style.pointerEvents = 'none'; // prevent any accidental drag/floating feel
    }

    // final: perfect fit for all screens, no overflow
    console.log("UTOM — professional icons, static logo, mobile optimized");
</script>
</body>
</html>
