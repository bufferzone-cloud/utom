<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>UTOM · Learn & Grow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8f9fc;
            padding-bottom: 70px;
        }

        /* Top bar (white) */
        .top-bar {
            background: white;
            padding: 0.9rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
        }

        .logo-img {
            height: 40px;
            width: auto;
            max-width: 130px;
            object-fit: contain;
        }

        .logo-fallback {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #000 30%, #F5B042 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-icons {
            display: flex;
            gap: 18px;
            position: relative;
        }

        .header-icons i {
            font-size: 1.3rem;
            color: #2c2c2c;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .notification-badge {
            position: absolute;
            top: -4px;
            right: -6px;
            background: #F5B042;
            color: black;
            font-size: 0.6rem;
            font-weight: bold;
            border-radius: 30px;
            padding: 2px 6px;
            min-width: 18px;
            text-align: center;
        }

        /* Welcome card */
        .welcome-card {
            background: white;
            margin: 1rem 1rem 0.5rem;
            padding: 1.2rem 1.5rem;
            border-radius: 28px;
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #f5e6d0;
        }

        .user-greeting h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .user-greeting p {
            font-size: 0.8rem;
            color: #666;
            margin-top: 4px;
        }

        .wallet-chip {
            background: #F5B042;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
            color: #000;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
        }

        .stats-row {
            display: flex;
            gap: 1.8rem;
            margin-top: 0.8rem;
            width: 100%;
            padding-top: 0.8rem;
            border-top: 1px dashed #ddd;
        }

        .stats-row span {
            font-size: 0.8rem;
            color: #444;
        }

        .stats-row i {
            color: #F5B042;
            margin-right: 5px;
        }

        /* Page containers */
        .page-container {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .active-page {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Floating scroll */
        .floating-section {
            padding: 0 0.8rem 0.8rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 0.5rem 0.8rem;
        }

        .floating-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            scrollbar-width: thin;
            padding-bottom: 8px;
        }

        .float-card {
            min-width: 260px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.15);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .float-card:hover {
            transform: translateY(-4px);
        }

        .card-thumb {
            position: relative;
            height: 140px;
            background: #f0ede8;
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F5B042;
        }

        .card-info {
            padding: 12px 14px 16px;
        }

        .card-info h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .badge {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: #F5B04220;
        }

        .free-badge {
            background: #e6f7e6;
            color: #2e7d32;
        }

        .btn-sm-yellow {
            background: #F5B042;
            border: none;
            color: black;
            font-weight: 700;
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Video grid - cards increased by 15% + floating shadows */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
            gap: 1.2rem;
            padding: 0.5rem;
        }

        .grid-card {
            background: white;
            border-radius: 26px;
            overflow: hidden;
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .grid-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 28px 36px -12px rgba(0,0,0,0.2);
        }

        .grid-img {
            position: relative;
            height: 110px;
            background: #d9d2c5;
        }

        .grid-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-play {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F5B042;
        }

        .grid-content {
            padding: 12px 12px 14px;
        }

        .grid-content h4 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .price-tag {
            font-weight: 800;
            font-size: 0.85rem;
            color: #F5B042;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 5px;
        }

        /* Profile card */
        .profile-card {
            background: white;
            margin: 1rem;
            border-radius: 32px;
            padding: 1.5rem;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }

        .wallet-big {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            background: #F5B04220;
            border-radius: 60px;
            padding: 0.5rem;
            margin-bottom: 1rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .btn-profile {
            background: #F5B042;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #F5B042;
            color: #000;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 1rem;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 48px;
            padding: 1.5rem;
            text-align: center;
        }

        .provider-btn, .upload-btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            background: #f5f5f5;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        .screenshot-preview {
            max-width: 100%;
            margin: 10px 0;
            border-radius: 20px;
        }

        /* YouTube-style player page */
        .player-container {
            background: #0f0f0f;
            min-height: 100vh;
        }

        .video-player-section {
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-wrapper {
            width: 100%;
            background: black;
        }

        .video-wrapper video {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
        }

        .player-info {
            padding: 1rem;
            background: white;
            color: black;
            border-radius: 24px 24px 0 0;
            margin-top: -2px;
        }

        .player-title {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .player-meta {
            display: flex;
            gap: 1rem;
            margin: 0.5rem 0;
            color: #606060;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .download-btn, .back-btn {
            background: #F5B042;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .related-header {
            font-size: 1.2rem;
            margin: 1rem 0 0.5rem 1rem;
            font-weight: bold;
            color: white;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }

        /* Bottom navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 14px;
            border-top: 1px solid #f0f0f0;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 0.7rem;
            color: #6b6b6b;
            background: none;
            border: none;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 1.3rem;
        }

        .nav-item.active {
            color: #F5B042;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .welcome-card {
                padding: 1rem;
            }
            .user-greeting h2 {
                font-size: 1.1rem;
            }
            .wallet-chip {
                padding: 6px 14px;
                font-size: 0.9rem;
            }
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            }
        }
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
    <div class="logo-area">
        <img src="logo.png" alt="UTOM" class="logo-img" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'logo-fallback\'><i class=\'fas fa-chalkboard-user\'></i> UTOM</div>';">
    </div>
    <div class="header-icons">
        <i class="fas fa-search" id="searchIcon"></i>
        <i class="fas fa-bell" id="notifIcon"></i>
        <span id="notifBadge" class="notification-badge" style="display: none;">0</span>
        <i class="fas fa-user-circle" id="profileIcon"></i>
    </div>
</div>

<!-- Welcome Card -->
<div class="welcome-card">
    <div style="display: flex; align-items: center; gap: 12px;">
        <div style="background: #F5B04220; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-user-graduate" style="color: #F5B042; font-size: 1.5rem;"></i>
        </div>
        <div class="user-greeting">
            <h2 id="greetingName">Welcome back!</h2>
            <p id="greetingEmail">loading...</p>

    <div class="wallet-chip" id="walletChip">
        <i class="fas fa-wallet"></i> <span id="headerWallet">ZMW 0</span>
    </div>
    <div class="stats-row">
        <span><i class="fas fa-video"></i> <span id="statVideos">0</span> lessons</span>
        <span><i class="fas fa-users"></i> 2.5k students</span>
        <span><i class="fas fa-trophy"></i> certificate</span>
    </div>
</div>

<!-- Page Containers -->
<div id="homePage" class="page-container active-page">
    <div class="floating-section">
        <div class="section-header">
            <h3><i class="fas fa-star" style="color:#F5B042;"></i> Featured</h3>
            <span>🔥 trending</span>
        </div>
        <div class="floating-scroll" id="floatingContainer"></div>
    </div>
    <div class="grid-section">
        <div class="grid-title">
            <h3><i class="fas fa-play-circle" style="color:#F5B042;"></i> All lessons</h3>

        <div class="video-grid" id="homeGrid"></div>

</div>

<div id="explorePage" class="page-container">
    <div id="exploreModulesContainer"></div>
</div>

<div id="wishlistPage" class="page-container">
    <div class="video-grid" id="wishlistGrid"></div>
    <div id="emptyWishlistMsg" style="text-align:center; padding:2rem; color:gray;">❤️ No liked videos yet.</div>
</div>

<div id="mylearningPage" class="page-container">
    <div class="video-grid" id="learningGrid"></div>
    <div id="emptyLearningMsg" style="text-align:center; padding:2rem; color:gray;">📚 No enrolled courses yet.</div>
</div>

<div id="profilePage" class="page-container">
    <div class="profile-card">
        <div class="wallet-big" id="walletAmount">ZMW 0</div>
        <div class="info-row"><span>Full name</span><span id="profileName"></span></div>
        <div class="info-row"><span>Email</span><span id="profileEmail"></span></div>
        <div class="info-row"><span>Phone</span><span id="profilePhone"></span></div>
        <button class="btn-profile" id="changePasswordBtn"><i class="fas fa-key"></i> Change Password</button>
        <button class="btn-profile" id="addFundsBtn"><i class="fas fa-wallet"></i> Add Funds to Wallet</button>
        <button class="btn-profile btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<!-- YouTube-style Player Page -->
<div id="playerPage" class="page-container">
    <div class="player-container">
        <div class="video-player-section">
            <div class="video-wrapper">
                <video id="playerVideo" controls playsinline></video>
            </div>
        </div>
        <div class="player-info">
            <div class="player-title" id="playerTitle"></div>
            <div class="player-meta">
                <span id="playerInstructor"></span>
                <span id="playerPrice"></span>
            </div>
            <div class="action-buttons">
                <button id="downloadVideoBtn" class="download-btn"><i class="fas fa-download"></i> Save offline</button>
                <button id="backFromPlayerBtn" class="back-btn"><i class="fas fa-arrow-left"></i> Back</button>
            </div>

        <div class="related-header">Related videos</div>
        <div class="related-grid" id="relatedGrid"></div>

</div>

<!-- Payment Modal with Screenshot Upload -->
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-credit-card"></i> Purchase Course</h3>
        <div id="paymentAmountDisplay" style="font-size:1.8rem; font-weight:800; color:#F5B042; margin:0.5rem 0;"></div>
        <div id="providerList">
            <button class="provider-btn" data-provider="MTN">📱 MTN Mobile Money</button>
            <button class="provider-btn" data-provider="Airtel">📱 Airtel Money</button>
            <button class="provider-btn" data-provider="Zamtel">📱 Zamtel Kwacha</button>
        </div>
        <div id="screenshotArea" style="display:none;">
            <p>Upload payment screenshot (after sending money)</p>
            <input type="file" id="screenshotInput" accept="image/*">

            <button id="submitPaymentBtn" class="btn-profile" style="margin-top:10px;">Submit for Approval</button>

        <button id="closePaymentModalBtn" style="margin-top:12px; background:#ddd; border:none; padding:8px; border-radius:40px;">Cancel</button>

<!-- Add Funds Modal -->
<div id="fundsModal" class="modal">
    <div class="modal-content">
        <h3>Add Funds</h3>
        <button id="funds100Btn" class="provider-btn">+ ZMW 100</button>
        <button id="closeFundsBtn" class="provider-btn" style="background:#ddd;">Cancel</button>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <button class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>Home</span></button>
    <button class="nav-item" data-page="explore"><i class="fas fa-compass"></i><span>Explore</span></button>
    <button class="nav-item" data-page="wishlist"><i class="fas fa-heart"></i><span>Wishlist</span></button>
    <button class="nav-item" data-page="mylearning"><i class="fas fa-book-open"></i><span>My Learn</span></button>
    <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set, update, onValue, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

    // Firebase config (same as index.html)
    const firebaseConfig = {
        apiKey: "AIzaSyDHiQHbATgnQIIB9X-gOM5XdmRbOsUJoBQ",
        authDomain: "utom-c4003.firebaseapp.com",
        databaseURL: "https://utom-c4003-default-rtdb.firebaseio.com",
        projectId: "utom-c4003",
        storageBucket: "utom-c4003.firebasestorage.app",
        messagingSenderId: "878225874050",
        appId: "1:878225874050:web:643626906bfd233eeae89b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // Global state
    let currentUser = null;
    let userData = { firstName: '', lastName: '', email: '', phone: '', wallet: 0, enrolled: [], liked: [] };
    let allVideos = [];
    let approvedPurchases = new Set(); // video ids approved by admin
    let notifications = [];
    let selectedVideoForPurchase = null;
    let selectedProvider = "";
    let screenshotFile = null;

    // IndexedDB for offline storage
    let offlineDB;
    const dbRequest = indexedDB.open('UTOMOfflineDB', 1);
    dbRequest.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('videos')) {
            db.createObjectStore('videos', { keyPath: 'id' });
        }
    };
    dbRequest.onsuccess = (e) => { offlineDB = e.target.result; };
    dbRequest.onerror = (e) => console.error("IndexedDB error", e);

    async function saveVideoOffline(videoId, videoUrl, title) {
        try {
            const response = await fetch(videoUrl);
            const blob = await response.blob();
            const tx = offlineDB.transaction('videos', 'readwrite');
            const store = tx.objectStore('videos');
            store.put({ id: videoId, blob: blob, title: title, url: videoUrl });
            addNotification(`📀 "${title}" saved offline!`);
        } catch(e) { addNotification("Download failed: " + e.message); }
    }

    async function loadOfflineVideo(videoId, videoElement) {
        if (!offlineDB) return false;
        const tx = offlineDB.transaction('videos', 'readonly');
        const store = tx.objectStore('videos');
        return new Promise((resolve) => {
            const getReq = store.get(videoId);
            getReq.onsuccess = () => {
                if (getReq.result) {
                    const blobUrl = URL.createObjectURL(getReq.result.blob);
                    videoElement.src = blobUrl;
                    resolve(true);
                } else { resolve(false); }
            };
            getReq.onerror = () => resolve(false);
        });
    }

    // Auth & ban/maintenance listeners
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        if (user.email && user.email.startsWith('admin@')) { window.location.href = 'admin.html'; return; }
        currentUser = user;
        await loadUserData(user.uid);
        // Ban listener
        const bannedRef = ref(db, `bannedUsers/${user.uid}`);
        onValue(bannedRef, (snap) => {
            if (snap.val() === true) {
                alert("Your account has been banned. Contact support.");
                signOut(auth);
                window.location.href = 'index.html';
            }
        });
        // Maintenance listener
        const maintRef = ref(db, 'system/maintenance');
        onValue(maintRef, (snap) => {
            if (snap.val() === true) alert("App under maintenance. Some features may be limited.");
        });
        // Approved purchases listener
        const approvedRef = ref(db, `approvedPurchases/${user.uid}`);
        onValue(approvedRef, (snap) => {
            approvedPurchases.clear();
            const data = snap.val();
            if (data) Object.keys(data).forEach(vid => approvedPurchases.add(vid));
            renderAllLists();
        });
        setupRealtimeVideoListener();
        setupUI();
        showPage('home');
    });

    async function loadUserData(uid) {
        const userRef = ref(db, `users/${uid}`);
        const snap = await get(userRef);
        if (snap.exists()) {
            userData = { ...userData, ...snap.val() };
            userData.enrolled = userData.enrolled || [];
            userData.liked = userData.liked || [];
            userData.wallet = userData.wallet || 0;
        } else {
            userData = { firstName: '', lastName: '', email: currentUser.email, phone: '', wallet: 0, enrolled: [], liked: [] };
            await set(userRef, userData);
        }
        updateUI();
    }

    async function saveUserData() {
        if (!currentUser) return;
        await update(ref(db, `users/${currentUser.uid}`), {
            wallet: userData.wallet,
            enrolled: userData.enrolled,
            liked: userData.liked,
            phone: userData.phone
        });
        updateUI();
    }

    function updateUI() {
        const name = `${userData.firstName} ${userData.lastName}`.trim() || currentUser.email.split('@')[0];
        document.getElementById('greetingName').innerText = `👋 ${name}`;
        document.getElementById('greetingEmail').innerText = currentUser.email;
        document.getElementById('headerWallet').innerText = `ZMW ${userData.wallet}`;
        document.getElementById('walletAmount').innerText = `ZMW ${userData.wallet}`;
        document.getElementById('profileName').innerText = name;
        document.getElementById('profileEmail').innerText = currentUser.email;
        document.getElementById('profilePhone').innerText = userData.phone || 'Not set';
    }

    function addNotification(msg) {
        notifications.unshift(msg);
        if (notifications.length > 10) notifications.pop();
        const badge = document.getElementById('notifBadge');
        badge.style.display = notifications.length ? 'inline-block' : 'none';
        badge.innerText = notifications.length > 9 ? '9+' : notifications.length;
        alert("🔔 " + msg);
    }

    // Check if user can watch a video (free OR enrolled OR approved)
    function canWatchVideo(video) {
        if (video.price === 0) return true;
        if (userData.enrolled.includes(video.id)) return true;
        if (approvedPurchases.has(video.id)) return true;
        return false;
    }

    // Video data from Firebase
    function setupRealtimeVideoListener() {
        const videosRef = ref(db, 'videos');
        onValue(videosRef, (snap) => {
            const data = snap.val();
            allVideos = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : [];
            document.getElementById('statVideos').innerText = allVideos.length;
            renderAllLists();
        });
    }

    function renderAllLists() {
        renderHome();
        renderExplore();
        renderWishlistPage();
        renderLearningPage();
    }

    // Create video card (enlarged, floating)
    function createVideoCard(video, isEnrolled, isLiked, showActions = true) {
        const card = document.createElement('div');
        card.className = 'grid-card';
        const heartIcon = isLiked ? 'fas fa-heart' : 'far fa-heart';
        const isApproved = approvedPurchases.has(video.id);
        const canAccess = isEnrolled || video.price === 0 || isApproved;
        card.innerHTML = `
            <div class="grid-img">
                <img src="${video.thumbnail || 'https://picsum.photos/300/180'}" alt="${escapeHtml(video.title)}" loading="lazy">
                <div class="grid-play play-video" data-id="${video.id}"><i class="fas fa-play"></i></div>
            </div>
            <div class="grid-content">
                <h4>${escapeHtml(video.title)}</h4>
                <div style="font-size:0.7rem; color:#666;">${escapeHtml(video.instructor)}</div>
                <div class="price-row">
                    <span class="price-tag">${video.price === 0 ? 'FREE' : `ZMW ${video.price}`}</span>
                    <div style="display:flex; gap:6px;">
                        ${showActions ? `<button class="icon-btn wishlist-btn" data-id="${video.id}"><i class="${heartIcon}"></i></button>` : ''}
                        ${showActions ? (canAccess ? `<span style="font-size:0.7rem;">✅</span>` : `<button class="btn-sm-yellow buy-btn" data-id="${video.id}" data-price="${video.price}">Buy</button>`) : ''}
                    </div>
                </div>
            </div>
        `;
        return card;
    }

    function attachVideoEvents() {
        document.querySelectorAll('.play-video').forEach(btn => {
            btn.removeEventListener('click', handlePlay);
            btn.addEventListener('click', handlePlay);
        });
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.removeEventListener('click', handleBuy);
            btn.addEventListener('click', handleBuy);
        });
        document.querySelectorAll('.wishlist-btn').forEach(btn => {
            btn.removeEventListener('click', handleWishlist);
            btn.addEventListener('click', handleWishlist);
        });
    }

    async function handlePlay(e) {
        e.stopPropagation();
        const id = e.currentTarget.closest('[data-id]').getAttribute('data-id');
        const video = allVideos.find(v => v.id === id);
        if (!video) return;
        if (!canWatchVideo(video)) {
            addNotification(`You need to purchase "${video.title}" first.`);
            return;
        }
        showPlayerPage(video);
    }

    async function handleBuy(e) {
        e.stopPropagation();
        const id = e.currentTarget.getAttribute('data-id');
        const video = allVideos.find(v => v.id === id);
        if (!video) return;
        if (video.price === 0) {
            if (!userData.enrolled.includes(video.id)) {
                userData.enrolled.push(video.id);
                await saveUserData();
                addNotification(`🎉 Enrolled in free course: ${video.title}`);
                renderAllLists();
            }
        } else {
            openPaymentModal(video);
        }
    }

    async function handleWishlist(e) {
        e.stopPropagation();
        const id = e.currentTarget.closest('.wishlist-btn').getAttribute('data-id');
        const idx = userData.liked.indexOf(id);
        if (idx === -1) {
            userData.liked.push(id);
            addNotification(`❤️ Added to wishlist.`);
        } else {
            userData.liked.splice(idx, 1);
            addNotification(`💔 Removed from wishlist.`);
        }
        await saveUserData();
        renderAllLists();
    }

    // Payment with screenshot
    function openPaymentModal(video) {
        selectedVideoForPurchase = video;
        document.getElementById('paymentAmountDisplay').innerText = `ZMW ${video.price}`;
        document.getElementById('providerList').style.display = 'block';
        document.getElementById('screenshotArea').style.display = 'none';
        document.getElementById('screenshotPreview').innerHTML = '';
        screenshotFile = null;
        paymentModal.classList.add('active');
    }

    function closePaymentModal() {
        paymentModal.classList.remove('active');
        selectedVideoForPurchase = null;
    }

    // Player page
    function showPlayerPage(video) {
        const playerVideo = document.getElementById('playerVideo');
        const playerTitle = document.getElementById('playerTitle');
        const playerInstructor = document.getElementById('playerInstructor');
        const playerPrice = document.getElementById('playerPrice');
        playerTitle.innerText = video.title;
        playerInstructor.innerText = video.instructor;
        playerPrice.innerText = video.price === 0 ? 'Free' : `ZMW ${video.price}`;
        // Try offline first
        loadOfflineVideo(video.id, playerVideo).then(loaded => {
            if (!loaded) playerVideo.src = video.videoUrl;
        });
        playerVideo.load();
        // Related videos
        const relatedGrid = document.getElementById('relatedGrid');
        relatedGrid.innerHTML = '';
        const related = allVideos.filter(v => v.id !== video.id).slice(0, 6);
        related.forEach(rel => {
            const card = createVideoCard(rel, userData.enrolled.includes(rel.id), userData.liked.includes(rel.id), false);
            card.classList.add('grid-card');
            const playDiv = card.querySelector('.play-video');
            if (playDiv) playDiv.addEventListener('click', () => showPlayerPage(rel));
            relatedGrid.appendChild(card);
        });
        // Hide other pages, show player
        document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active-page'));
        document.getElementById('playerPage').classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    }

    // Render functions
    function renderHome() {
        const featured = allVideos.slice(0, 4);
        const container = document.getElementById('floatingContainer');
        container.innerHTML = '';
        featured.forEach(v => {
            const div = document.createElement('div');
            div.className = 'float-card';
            div.innerHTML = `
                <div class="card-thumb"><img src="${v.thumbnail}"><div class="play-overlay play-video" data-id="${v.id}"><i class="fas fa-play"></i></div></div>
                <div class="card-info"><h4>${escapeHtml(v.title)}</h4><div class="meta"><span class="badge ${v.price===0 ? 'free-badge' : ''}">${v.price===0 ? 'FREE' : 'PREMIUM'}</span><button class="btn-sm-yellow buy-btn" data-id="${v.id}">${v.price===0 ? 'Enroll' : 'Buy'}</button></div></div>
            `;
            container.appendChild(div);
        });
        const homeGrid = document.getElementById('homeGrid');
        homeGrid.innerHTML = '';
        allVideos.slice(0, 9).forEach(v => {
            homeGrid.appendChild(createVideoCard(v, userData.enrolled.includes(v.id), userData.liked.includes(v.id), true));
        });
        attachVideoEvents();
    }

    function renderExplore() {
        const container = document.getElementById('exploreModulesContainer');
        container.innerHTML = '';
        const modules = [...new Set(allVideos.map(v => v.module || 'General'))];
        modules.forEach(mod => {
            const moduleVideos = allVideos.filter(v => (v.module || 'General') === mod);
            const section = document.createElement('div');
            section.innerHTML = `<h3 style="padding: 0.8rem 1rem 0.2rem;"><i class="fas fa-folder-open"></i> ${escapeHtml(mod)}</h3><div class="video-grid" id="grid-mod-${mod.replace(/\s/g,'')}"></div>`;
            container.appendChild(section);
            const gridDiv = section.querySelector('.video-grid');
            moduleVideos.forEach(v => {
                gridDiv.appendChild(createVideoCard(v, userData.enrolled.includes(v.id), userData.liked.includes(v.id), true));
            });
        });
        attachVideoEvents();
    }

    function renderWishlistPage() {
        const grid = document.getElementById('wishlistGrid');
        const emptyMsg = document.getElementById('emptyWishlistMsg');
        const likedVids = allVideos.filter(v => userData.liked.includes(v.id));
        if (likedVids.length === 0) {
            grid.innerHTML = '';
            emptyMsg.style.display = 'block';
            return;
        }
        emptyMsg.style.display = 'none';
        grid.innerHTML = '';
        likedVids.forEach(v => {
            grid.appendChild(createVideoCard(v, userData.enrolled.includes(v.id), true, true));
        });
        attachVideoEvents();
    }

    function renderLearningPage() {
        const grid = document.getElementById('learningGrid');
        const emptyMsg = document.getElementById('emptyLearningMsg');
        const enrolledVids = allVideos.filter(v => userData.enrolled.includes(v.id) || approvedPurchases.has(v.id));
        if (enrolledVids.length === 0) {
            grid.innerHTML = '';
            emptyMsg.style.display = 'block';
            return;
        }
        emptyMsg.style.display = 'none';
        grid.innerHTML = '';
        enrolledVids.forEach(v => {
            grid.appendChild(createVideoCard(v, true, userData.liked.includes(v.id), true));
        });
        attachVideoEvents();
    }

    // UI Setup
    function setupUI() {
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => showPage(btn.dataset.page));
        });
        document.getElementById('viewAllBtn').addEventListener('click', () => showPage('explore'));
        document.getElementById('profileIcon').addEventListener('click', () => showPage('profile'));
        document.getElementById('addFundsBtn').addEventListener('click', () => document.getElementById('fundsModal').classList.add('active'));
        document.getElementById('closeFundsBtn').addEventListener('click', () => document.getElementById('fundsModal').classList.remove('active'));
        document.getElementById('funds100Btn').addEventListener('click', async () => {
            userData.wallet += 100;
            await saveUserData();
            addNotification(`💰 Wallet funded with ZMW 100`);
            document.getElementById('fundsModal').classList.remove('active');
        });
        document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'index.html'; });
        document.getElementById('changePasswordBtn').addEventListener('click', async () => {
            if (currentUser) await sendPasswordResetEmail(auth, currentUser.email);
            alert('Password reset email sent.');
        });
        // Payment modal logic
        document.querySelectorAll('.provider-btn[data-provider]').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedProvider = btn.dataset.provider;
                document.getElementById('providerList').style.display = 'none';
                document.getElementById('screenshotArea').style.display = 'block';
            });
        });
        document.getElementById('screenshotInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) { screenshotFile = file; const reader = new FileReader(); reader.onload = (ev) => { document.getElementById('screenshotPreview').innerHTML = `<img src="${ev.target.result}" class="screenshot-preview" style="max-width:100%; border-radius:20px;">`; }; reader.readAsDataURL(file); }
        });
        document.getElementById('submitPaymentBtn').addEventListener('click', async () => {
            if (!selectedVideoForPurchase || !screenshotFile) { alert("Please select a screenshot."); return; }
            const storagePath = `screenshots/${currentUser.uid}/${Date.now()}_${selectedVideoForPurchase.id}`;
            const fileRef = storageRef(storage, storagePath);
            const uploadTask = await uploadBytes(fileRef, screenshotFile);
            const screenshotURL = await getDownloadURL(fileRef);
            const pendingRef = push(ref(db, `pendingPurchases/${currentUser.uid}`));
            await set(pendingRef, {
                videoId: selectedVideoForPurchase.id,
                videoTitle: selectedVideoForPurchase.title,
                amount: selectedVideoForPurchase.price,
                provider: selectedProvider,
                screenshot: screenshotURL,
                status: 'pending',
                timestamp: Date.now()
            });
            addNotification(`✅ Purchase request sent. Awaiting admin approval for "${selectedVideoForPurchase.title}"`);
            closePaymentModal();
        });
        document.getElementById('closePaymentModalBtn').addEventListener('click', closePaymentModal);
        // Player back button
        document.getElementById('backFromPlayerBtn').addEventListener('click', () => showPage('home'));
        document.getElementById('downloadVideoBtn').addEventListener('click', () => {
            const video = allVideos.find(v => v.id === document.getElementById('playerTitle').innerText);
            if (video) saveVideoOffline(video.id, video.videoUrl, video.title);
        });
        document.getElementById('searchIcon').addEventListener('click', () => {
            const q = prompt("Search videos:");
            if (q) { const results = allVideos.filter(v => v.title.toLowerCase().includes(q.toLowerCase())); alert(`Found ${results.length} results`); }
        });
        document.getElementById('notifIcon').addEventListener('click', () => alert(notifications.length ? notifications.join("\n") : "No notifications"));
        document.querySelectorAll('.modal').forEach(m => { m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('active'); }); });
    }

    function showPage(pageId) {
        document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId + 'Page').classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(btn => { btn.classList.remove('active'); if (btn.dataset.page === pageId) btn.classList.add('active'); });
        if (pageId === 'home') renderHome();
        if (pageId === 'explore') renderExplore();
        if (pageId === 'wishlist') renderWishlistPage();
        if (pageId === 'mylearning') renderLearningPage();
        if (pageId === 'profile') updateUI();
    }

    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
</script>
</body>
</html>
