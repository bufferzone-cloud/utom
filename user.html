<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>UTOM · Learn & Grow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8f9fc;
            padding-bottom: 70px;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            background: white;
            padding: 0.9rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
        }

        .logo-img {
            height: 40px;
            width: auto;
            max-width: 130px;
            object-fit: contain;
        }

        .logo-fallback {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #000 30%, #F5B042 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-icons {
            display: flex;
            gap: 18px;
            position: relative;
        }

        .header-icons i {
            font-size: 1.3rem;
            color: #2c2c2c;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .header-icons i:active {
            background: #f0f0f0;
            transform: scale(0.94);
        }

        .notification-badge {
            position: absolute;
            top: -4px;
            right: -6px;
            background: #F5B042;
            color: black;
            font-size: 0.6rem;
            font-weight: bold;
            border-radius: 30px;
            padding: 2px 6px;
            min-width: 18px;
            text-align: center;
        }

        /* ===== WELCOME CARD ===== */
        .welcome-card {
            background: white;
            margin: 1rem 1rem 0.5rem;
            padding: 1.2rem 1.5rem;
            border-radius: 28px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.04);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #f5e6d0;
        }

        .user-greeting h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .user-greeting p {
            font-size: 0.8rem;
            color: #666;
            margin-top: 4px;
        }

        .wallet-chip {
            background: #F5B042;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
            color: #000;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
        }

        .stats-row {
            display: flex;
            gap: 1.8rem;
            margin-top: 0.8rem;
            width: 100%;
            padding-top: 0.8rem;
            border-top: 1px dashed #ddd;
        }

        .stats-row span {
            font-size: 0.8rem;
            color: #444;
        }

        .stats-row i {
            color: #F5B042;
            margin-right: 5px;
        }

        /* Page containers */
        .page-container {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .active-page {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Sections */
        .floating-section {
            padding: 0 0.8rem 0.8rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 0.5rem 0.8rem;
        }

        .floating-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            scrollbar-width: thin;
            padding-bottom: 8px;
        }

        .float-card {
            min-width: 250px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.12);
            overflow: hidden;
            cursor: pointer;
        }

        .card-thumb {
            position: relative;
            height: 140px;
            background: #f0ede8;
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F5B042;
        }

        .card-info {
            padding: 12px 14px 16px;
        }

        .card-info h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .badge {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: #F5B04220;
        }

        .free-badge {
            background: #e6f7e6;
            color: #2e7d32;
        }

        .btn-sm-yellow {
            background: #F5B042;
            border: none;
            color: black;
            font-weight: 700;
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Grid */
        .grid-section {
            padding: 1rem 1rem 0.5rem;
        }

        .grid-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 1rem;
        }

        .grid-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0,0,0,0.04);
            cursor: pointer;
        }

        .grid-img {
            position: relative;
            height: 100px;
            background: #d9d2c5;
        }

        .grid-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-play {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0,0,0,0.6);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F5B042;
        }

        .grid-content {
            padding: 10px 10px 12px;
        }

        .grid-content h4 {
            font-size: 0.85rem;
            font-weight: 700;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }

        .price-tag {
            font-weight: 800;
            font-size: 0.8rem;
            color: #F5B042;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 5px;
        }

        /* Profile card */
        .profile-card {
            background: white;
            margin: 1rem;
            border-radius: 32px;
            padding: 1.5rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }

        .wallet-big {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            background: #F5B04220;
            border-radius: 60px;
            padding: 0.5rem;
            margin-bottom: 1rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .btn-profile {
            background: #F5B042;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #F5B042;
            color: #000;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 1rem;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: white;
            width: 85%;
            max-width: 340px;
            border-radius: 48px;
            padding: 1.5rem;
            text-align: center;
        }

        .mobile-options button,
        .payment-method button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            background: #f5f5f5;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        .ussd-instructions {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 24px;
            margin: 10px 0;
            font-size: 0.85rem;
            text-align: left;
        }

        /* Bottom navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 14px;
            border-top: 1px solid #f0f0f0;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 0.7rem;
            color: #6b6b6b;
            background: none;
            border: none;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 1.3rem;
        }

        .nav-item.active {
            color: #F5B042;
            font-weight: 600;
        }

        /* Video modal */
        .video-modal-content {
            max-width: 500px;
            padding: 0;
            overflow: hidden;
        }

        .video-player-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: black;
        }

        .video-player-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-modal-info {
            padding: 1rem 1.2rem 1.5rem;
        }

        @media (max-width: 480px) {
            .welcome-card {
                padding: 1rem;
            }
            .user-greeting h2 {
                font-size: 1.1rem;
            }
            .wallet-chip {
                padding: 6px 14px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<div class="top-bar">
    <div class="logo-area">
        <img src="utom.png" alt="UTOM" class="logo-img" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'logo-fallback\'><i class=\'fas fa-chalkboard-user\'></i> UTOM</div>';">
    </div>
    <div class="header-icons">
        <i class="fas fa-search" id="searchIcon"></i>
        <i class="fas fa-bell" id="notifIcon"></i>
        <span id="notifBadge" class="notification-badge" style="display: none;">0</span>
        <i class="fas fa-user-circle" id="profileIcon"></i>
    </div>
</div>

<!-- ===== WELCOME CARD ===== -->
<div class="welcome-card" id="welcomeCard">
    <div style="display: flex; align-items: center; gap: 12px;">
        <div style="background: #F5B04220; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-user-graduate" style="color: #F5B042; font-size: 1.5rem;"></i>
        </div>
        <div class="user-greeting">
            <h2 id="greetingName">Welcome back!</h2>
            <p id="greetingEmail">loading...</p>
        </div>
    </div>
    <div class="wallet-chip" id="walletChip">
        <i class="fas fa-wallet"></i> <span id="headerWallet">ZMW 0</span>
    </div>
    <div class="stats-row">
        <span><i class="fas fa-video"></i> <span id="statVideos">0</span> lessons</span>
        <span><i class="fas fa-users"></i> 2.5k students</span>
        <span><i class="fas fa-trophy"></i> certificate</span>
    </div>
</div>

<!-- ===== PAGE CONTAINERS ===== -->
<div id="homePage" class="page-container active-page">
    <div class="floating-section">
        <div class="section-header">
            <h3><i class="fas fa-star" style="color:#F5B042;"></i> Featured</h3>
            <span>🔥 trending</span>
        </div>
        <div class="floating-scroll" id="floatingContainer"></div>
    </div>
    <div class="grid-section">
        <div class="grid-title">
            <h3><i class="fas fa-play-circle" style="color:#F5B042;"></i> All lessons</h3>
            <button class="btn-sm-yellow" id="viewAllBtn">See all <i class="fas fa-arrow-right"></i></button>
        </div>
        <div class="video-grid" id="homeGrid"></div>
    </div>
</div>

<div id="explorePage" class="page-container">
    <div id="exploreModulesContainer"></div>
</div>

<div id="wishlistPage" class="page-container">
    <div class="video-grid" id="wishlistGrid"></div>
    <div id="emptyWishlistMsg" style="text-align:center; padding:2rem; color:gray;">❤️ No liked videos yet.</div>
</div>

<div id="mylearningPage" class="page-container">
    <div class="video-grid" id="learningGrid"></div>
    <div id="emptyLearningMsg" style="text-align:center; padding:2rem; color:gray;">📚 No enrolled courses yet.</div>
</div>

<div id="profilePage" class="page-container">
    <div class="profile-card">
        <div class="wallet-big" id="walletAmount">ZMW 0</div>
        <div class="info-row"><span>Full name</span><span id="profileName"></span></div>
        <div class="info-row"><span>Email</span><span id="profileEmail"></span></div>
        <div class="info-row"><span>Phone</span><span id="profilePhone"></span></div>
        <button class="btn-profile" id="changePasswordBtn"><i class="fas fa-key"></i> Change Password</button>
        <button class="btn-profile" id="addFundsBtn"><i class="fas fa-wallet"></i> Add Funds to Wallet</button>
        <button class="btn-profile btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<!-- ===== PAYMENT MODAL ===== -->
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-credit-card"></i> Complete Payment</h3>
        <p id="paymentAmount" style="font-weight: bold; margin: 10px 0;"></p>
        <div class="mobile-options" id="providerOptions">
            <button id="payMtn">📱 MTN Mobile Money</button>
            <button id="payAirtel">📱 Airtel Money</button>
            <button id="payZamtel">📱 Zamtel Kwacha</button>
        </div>
        <div id="paymentMethodContainer" style="display: none;">
            <div class="payment-method">
                <button id="onlinePaymentBtn">💻 Online Payment (Instant)</button>
                <button id="ussdPaymentBtn">📞 Manual USSD Code</button>
            </div>
        </div>
        <div id="ussdInfo" style="display: none;" class="ussd-instructions"></div>
        <button id="closePaymentModal" style="margin-top: 12px; background:#ddd; border:none; padding:8px; border-radius:40px; width:100%;">Cancel</button>
    </div>
</div>

<!-- ===== ADD FUNDS MODAL ===== -->
<div id="mobileMoneyModal" class="modal">
    <div class="modal-content">
        <h3>Add Funds to Wallet</h3>
        <div class="mobile-options">
            <button id="mtnOption">📱 MTN Mobile Money</button>
            <button id="airtelOption">📱 Airtel Money</button>
            <button id="zamtelOption">📱 Zamtel Kwacha</button>
        </div>
        <button id="closeFundsModal" style="margin-top: 12px; background:#ddd; border:none; padding:8px; border-radius:40px; width:100%;">Cancel</button>
    </div>
</div>

<!-- ===== VIDEO PLAYER MODAL ===== -->
<div id="videoPlayerModal" class="modal">
    <div class="modal-content video-modal-content">
        <div class="video-player-container">
            <video id="mainVideoPlayer" controls controlsList="nodownload"></video>
        </div>
        <div class="video-modal-info">
            <h4 id="videoPlayerTitle"></h4>
            <p id="videoPlayerInstructor"></p>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="downloadVideoBtn" class="btn-profile" style="margin:0;"><i class="fas fa-download"></i> Download</button>
                <button id="closeVideoModalBtn" class="btn-profile btn-outline" style="margin:0;">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== BOTTOM NAVIGATION ===== -->
<div class="bottom-nav">
    <button class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>Home</span></button>
    <button class="nav-item" data-page="explore"><i class="fas fa-compass"></i><span>Explore</span></button>
    <button class="nav-item" data-page="wishlist"><i class="fas fa-heart"></i><span>Wishlist</span></button>
    <button class="nav-item" data-page="mylearning"><i class="fas fa-book-open"></i><span>My Learn</span></button>
    <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></button>
</div>

<script type="module">
    // ========== FIREBASE & CONFIG ==========
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set, update, onValue, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCZEqWRAHW0tW6j0WfBf8lxj61oExa6BwY",
        authDomain: "wizafoodcafe.firebaseapp.com",
        databaseURL: "https://wizafoodcafe-default-rtdb.firebaseio.com",
        projectId: "wizafoodcafe",
        storageBucket: "wizafoodcafe.firebasestorage.app",
        messagingSenderId: "248334218737",
        appId: "1:248334218737:web:94fabd0bbdf75bb8410050"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ========== GLOBAL STATE ==========
    let currentUser = null;
    let userData = { firstName: '', lastName: '', email: '', phone: '', wallet: 0, enrolled: [], liked: [] };
    let allVideos = [];
    let notifications = [];
    let pendingVideo = null;
    let selectedProvider = '';

    // DOM Elements
    const paymentModal = document.getElementById('paymentModal');
    const fundsModal = document.getElementById('mobileMoneyModal');
    const videoModal = document.getElementById('videoPlayerModal');
    const videoPlayer = document.getElementById('mainVideoPlayer');
    const videoPlayerTitle = document.getElementById('videoPlayerTitle');
    const videoPlayerInstructor = document.getElementById('videoPlayerInstructor');
    let currentPlayingVideo = null;

    // ========== AUTH CHECK ==========
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        if (user.email === 'admin@utom.com') { window.location.href = 'admin.html'; return; }
        currentUser = user;
        await loadUserData(user.uid);
        setupRealtimeVideoListener();
        setupUI();
        showPage('home');
    });

    // ========== LOAD USER DATA ==========
    async function loadUserData(uid) {
        const userRef = ref(db, `users/${uid}`);
        const snap = await get(userRef);
        if (snap.exists()) {
            userData = { ...userData, ...snap.val() };
            userData.enrolled = userData.enrolled || [];
            userData.liked = userData.liked || [];
            userData.wallet = userData.wallet || 0;
        } else {
            userData = {
                firstName: currentUser.displayName?.split(' ')[0] || '',
                lastName: currentUser.displayName?.split(' ')[1] || '',
                email: currentUser.email,
                phone: '',
                wallet: 0,
                enrolled: [],
                liked: []
            };
            await set(userRef, userData);
        }
        updateWelcomeHeader();
        updateProfileUI();
    }

    function updateWelcomeHeader() {
        const name = `${userData.firstName} ${userData.lastName}`.trim() || currentUser.email.split('@')[0];
        document.getElementById('greetingName').innerText = `👋 ${name}`;
        document.getElementById('greetingEmail').innerText = currentUser.email;
        document.getElementById('headerWallet').innerText = `ZMW ${userData.wallet}`;
        document.getElementById('walletAmount').innerText = `ZMW ${userData.wallet}`;
        document.getElementById('profileName').innerText = name;
        document.getElementById('profileEmail').innerText = currentUser.email;
        document.getElementById('profilePhone').innerText = userData.phone || 'Not set';
    }

    function updateProfileUI() {
        updateWelcomeHeader();
    }

    // ========== SAVE USER DATA ==========
    async function saveUserData() {
        if (!currentUser) return;
        const userRef = ref(db, `users/${currentUser.uid}`);
        await update(userRef, {
            wallet: userData.wallet,
            enrolled: userData.enrolled,
            liked: userData.liked,
            phone: userData.phone
        });
        updateWelcomeHeader();
    }

    // ========== REALTIME VIDEOS ==========
    function setupRealtimeVideoListener() {
        const videosRef = ref(db, 'videos');
        onValue(videosRef, (snap) => {
            const data = snap.val();
            allVideos = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : [];
            document.getElementById('statVideos').innerText = allVideos.length;
            renderHome();
            renderExplore();
            renderWishlistPage();
            renderLearningPage();
        });
    }

    // ========== NOTIFICATIONS ==========
    function addNotification(msg) {
        notifications.unshift(msg);
        if (notifications.length > 10) notifications.pop();
        const badge = document.getElementById('notifBadge');
        badge.style.display = notifications.length ? 'inline-block' : 'none';
        badge.innerText = notifications.length > 9 ? '9+' : notifications.length;
        alert("🔔 " + msg);
    }

    // ========== ENROLLMENT ==========
    async function completeEnrollment(video) {
        if (userData.enrolled.includes(video.id)) {
            addNotification(`You already own "${video.title}"`);
            return false;
        }
        if (video.price === 0) {
            userData.enrolled.push(video.id);
            addNotification(`🎉 Enrolled in free course: ${video.title}`);
            await saveUserData();
            return true;
        } else {
            if (userData.wallet >= video.price) {
                userData.wallet -= video.price;
                userData.enrolled.push(video.id);
                const txRef = push(ref(db, 'transactions'));
                await set(txRef, {
                    userId: currentUser.uid,
                    userEmail: userData.email,
                    userName: `${userData.firstName} ${userData.lastName}`,
                    videoId: video.id,
                    videoTitle: video.title,
                    amount: video.price,
                    date: new Date().toLocaleString(),
                    paymentMethod: selectedProvider || 'Wallet',
                    status: 'Completed'
                });
                addNotification(`✅ Payment of ZMW ${video.price} successful. "${video.title}" added.`);
                await saveUserData();
                return true;
            } else {
                addNotification(`❌ Insufficient balance. Add funds to buy "${video.title}" (ZMW ${video.price})`);
                return false;
            }
        }
    }

    // ========== ADD FUNDS ==========
    async function addFunds(amount = 100) {
        userData.wallet += amount;
        await saveUserData();
        addNotification(`💰 Wallet funded with ZMW ${amount}. New balance: ZMW ${userData.wallet}`);
    }

    // ========== VIDEO PLAYER ==========
    function playVideo(video) {
        currentPlayingVideo = video;
        videoPlayerTitle.innerText = video.title;
        videoPlayerInstructor.innerText = video.instructor;
        videoPlayer.src = video.videoUrl;
        videoPlayer.load();
        videoModal.classList.add('active');
    }

    function downloadVideo() {
        if (!currentPlayingVideo) return;
        const link = document.createElement('a');
        link.href = currentPlayingVideo.videoUrl;
        link.download = `${currentPlayingVideo.title}.mp4`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        addNotification(`📥 Download started: ${currentPlayingVideo.title}`);
    }

    // ========== RENDER FUNCTIONS ==========
    function createVideoCard(video, isEnrolled, isLiked, showActions = true) {
        const card = document.createElement('div');
        card.className = 'grid-card';
        const heartIcon = isLiked ? 'fas fa-heart' : 'far fa-heart';
        card.innerHTML = `
            <div class="grid-img">
                <img src="${video.thumbnail || 'https://picsum.photos/300/180'}" alt="${escapeHtml(video.title)}" loading="lazy">
                <div class="grid-play play-video" data-id="${video.id}"><i class="fas fa-play"></i></div>
            </div>
            <div class="grid-content">
                <h4>${escapeHtml(video.title)}</h4>
                <div style="font-size:0.7rem; color:#666;">${escapeHtml(video.instructor)}</div>
                <div class="price-row">
                    <span class="price-tag">${video.price === 0 ? 'FREE' : `ZMW ${video.price}`}</span>
                    <div style="display:flex; gap:6px;">
                        ${showActions ? `<button class="icon-btn wishlist-btn" data-id="${video.id}"><i class="${heartIcon}"></i></button>` : ''}
                        ${showActions ? (isEnrolled ? `<span style="font-size:0.7rem;">✅</span>` : `<button class="btn-sm-yellow buy-btn" data-id="${video.id}" data-price="${video.price}">${video.price === 0 ? 'Enroll' : 'Buy'}</button>`) : ''}
                    </div>
                </div>
            </div>
        `;
        return card;
    }

    function attachVideoEvents() {
        document.querySelectorAll('.play-video').forEach(btn => {
            btn.removeEventListener('click', handlePlay);
            btn.addEventListener('click', handlePlay);
        });
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.removeEventListener('click', handleBuy);
            btn.addEventListener('click', handleBuy);
        });
        document.querySelectorAll('.wishlist-btn').forEach(btn => {
            btn.removeEventListener('click', handleWishlist);
            btn.addEventListener('click', handleWishlist);
        });
    }

    async function handlePlay(e) {
        e.stopPropagation();
        const id = e.currentTarget.closest('[data-id]').getAttribute('data-id');
        const video = allVideos.find(v => v.id === id);
        if (video) playVideo(video);
    }

    async function handleBuy(e) {
        e.stopPropagation();
        const id = e.currentTarget.getAttribute('data-id');
        const video = allVideos.find(v => v.id === id);
        if (video.price === 0) {
            if (await completeEnrollment(video)) {
                renderHome(); renderExplore(); renderWishlistPage(); renderLearningPage();
            }
        } else {
            openPaymentModal(video);
        }
    }

    async function handleWishlist(e) {
        e.stopPropagation();
        const id = e.currentTarget.closest('.wishlist-btn').getAttribute('data-id');
        const idx = userData.liked.indexOf(id);
        if (idx === -1) {
            userData.liked.push(id);
            addNotification(`❤️ Added to wishlist.`);
        } else {
            userData.liked.splice(idx, 1);
            addNotification(`💔 Removed from wishlist.`);
        }
        await saveUserData();
        renderHome(); renderExplore(); renderWishlistPage(); renderLearningPage();
    }

    function renderHome() {
        const featured = allVideos.slice(0, 4);
        const container = document.getElementById('floatingContainer');
        container.innerHTML = '';
        featured.forEach(v => {
            const div = document.createElement('div');
            div.className = 'float-card';
            div.innerHTML = `
                <div class="card-thumb"><img src="${v.thumbnail}"><div class="play-overlay play-video" data-id="${v.id}"><i class="fas fa-play"></i></div></div>
                <div class="card-info"><h4>${escapeHtml(v.title)}</h4><div class="meta"><span class="badge ${v.price===0 ? 'free-badge' : ''}">${v.price===0 ? 'FREE' : 'PREMIUM'}</span><button class="btn-sm-yellow buy-btn" data-id="${v.id}">${v.price===0 ? 'Enroll' : 'Buy'}</button></div></div>
            `;
            container.appendChild(div);
        });
        const homeGrid = document.getElementById('homeGrid');
        homeGrid.innerHTML = '';
        const homeVids = allVideos.slice(0, 9);
        homeVids.forEach(v => {
            const enrolled = userData.enrolled.includes(v.id);
            const liked = userData.liked.includes(v.id);
            homeGrid.appendChild(createVideoCard(v, enrolled, liked, true));
        });
        attachVideoEvents();
    }

    function renderExplore() {
        const container = document.getElementById('exploreModulesContainer');
        container.innerHTML = '';
        const modules = [...new Set(allVideos.map(v => v.module))];
        modules.forEach(mod => {
            const moduleVideos = allVideos.filter(v => v.module === mod);
            const section = document.createElement('div');
            section.innerHTML = `<h3 style="padding: 0.8rem 1rem 0.2rem;"><i class="fas fa-folder-open"></i> ${escapeHtml(mod)}</h3><div class="video-grid" id="grid-mod-${mod.replace(/\s/g,'')}"></div>`;
            container.appendChild(section);
            const gridDiv = section.querySelector('.video-grid');
            moduleVideos.forEach(v => {
                const enrolled = userData.enrolled.includes(v.id);
                const liked = userData.liked.includes(v.id);
                gridDiv.appendChild(createVideoCard(v, enrolled, liked, true));
            });
        });
        attachVideoEvents();
    }

    function renderWishlistPage() {
        const grid = document.getElementById('wishlistGrid');
        const emptyMsg = document.getElementById('emptyWishlistMsg');
        const likedVids = allVideos.filter(v => userData.liked.includes(v.id));
        if (likedVids.length === 0) {
            grid.innerHTML = '';
            emptyMsg.style.display = 'block';
            return;
        }
        emptyMsg.style.display = 'none';
        grid.innerHTML = '';
        likedVids.forEach(v => {
            const enrolled = userData.enrolled.includes(v.id);
            grid.appendChild(createVideoCard(v, enrolled, true, true));
        });
        attachVideoEvents();
    }

    function renderLearningPage() {
        const grid = document.getElementById('learningGrid');
        const emptyMsg = document.getElementById('emptyLearningMsg');
        const enrolledVids = allVideos.filter(v => userData.enrolled.includes(v.id));
        if (enrolledVids.length === 0) {
            grid.innerHTML = '';
            emptyMsg.style.display = 'block';
            return;
        }
        emptyMsg.style.display = 'none';
        grid.innerHTML = '';
        enrolledVids.forEach(v => {
            const liked = userData.liked.includes(v.id);
            grid.appendChild(createVideoCard(v, true, liked, true));
        });
        attachVideoEvents();
    }

    // ========== PAYMENT MODAL ==========
    function openPaymentModal(video) {
        pendingVideo = video;
        document.getElementById('paymentAmount').innerText = `Amount: ZMW ${video.price}`;
        document.getElementById('providerOptions').style.display = 'block';
        document.getElementById('paymentMethodContainer').style.display = 'none';
        document.getElementById('ussdInfo').style.display = 'none';
        selectedProvider = '';
        paymentModal.classList.add('active');
    }

    function closePaymentModal() {
        paymentModal.classList.remove('active');
        pendingVideo = null;
    }

    // ========== PAGE NAVIGATION ==========
    function showPage(pageId) {
        document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId + 'Page').classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.page === pageId) btn.classList.add('active');
        });
        if (pageId === 'home') renderHome();
        if (pageId === 'explore') renderExplore();
        if (pageId === 'wishlist') renderWishlistPage();
        if (pageId === 'mylearning') renderLearningPage();
        if (pageId === 'profile') updateProfileUI();
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ========== UI SETUP ==========
    function setupUI() {
        // Bottom nav
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => showPage(btn.dataset.page));
        });

        // Payment modal
        document.getElementById('payMtn').onclick = () => { selectedProvider = 'MTN'; showPaymentMethod(); };
        document.getElementById('payAirtel').onclick = () => { selectedProvider = 'Airtel'; showPaymentMethod(); };
        document.getElementById('payZamtel').onclick = () => { selectedProvider = 'Zamtel'; showPaymentMethod(); };
        function showPaymentMethod() {
            document.getElementById('providerOptions').style.display = 'none';
            document.getElementById('paymentMethodContainer').style.display = 'block';
        }
        document.getElementById('onlinePaymentBtn').onclick = async () => {
            if (!pendingVideo) return;
            if (await completeEnrollment(pendingVideo)) {
                closePaymentModal();
                renderHome(); renderExplore(); renderWishlistPage(); renderLearningPage();
            } else {
                closePaymentModal();
            }
        };
        document.getElementById('ussdPaymentBtn').onclick = () => {
            if (!pendingVideo) return;
            let code = selectedProvider === 'MTN' ? '*150#' : (selectedProvider === 'Airtel' ? '*115#' : '*100#');
            document.getElementById('ussdInfo').innerHTML = `
                <strong>Manual USSD Payment</strong><br>
                Dial ${code}, select "Make Payment", amount ZMW ${pendingVideo.price}, ref UTOM${pendingVideo.id}. Then click "I have paid".
                <button id="confirmManualPayment" style="margin-top:12px; background:#F5B042; border:none; padding:8px; border-radius:40px; width:100%;">✅ I have paid</button>
            `;
            document.getElementById('ussdInfo').style.display = 'block';
            document.getElementById('paymentMethodContainer').style.display = 'none';
            document.getElementById('confirmManualPayment')?.addEventListener('click', async () => {
                if (await completeEnrollment(pendingVideo)) {
                    closePaymentModal();
                    renderHome(); renderExplore(); renderWishlistPage(); renderLearningPage();
                } else {
                    closePaymentModal();
                }
            });
        };
        document.getElementById('closePaymentModal').addEventListener('click', closePaymentModal);

        // Funds modal
        document.getElementById('addFundsBtn').addEventListener('click', () => fundsModal.classList.add('active'));
        document.getElementById('closeFundsModal').addEventListener('click', () => fundsModal.classList.remove('active'));
        document.getElementById('mtnOption').addEventListener('click', async () => { await addFunds(100); fundsModal.classList.remove('active'); });
        document.getElementById('airtelOption').addEventListener('click', async () => { await addFunds(100); fundsModal.classList.remove('active'); });
        document.getElementById('zamtelOption').addEventListener('click', async () => { await addFunds(100); fundsModal.classList.remove('active'); });

        // Video modal
        document.getElementById('closeVideoModalBtn').addEventListener('click', () => {
            videoModal.classList.remove('active');
            videoPlayer.pause();
        });
        document.getElementById('downloadVideoBtn').addEventListener('click', downloadVideo);

        // Profile
        document.getElementById('changePasswordBtn').addEventListener('click', async () => {
            if (currentUser) {
                await sendPasswordResetEmail(auth, currentUser.email);
                alert('Password reset email sent.');
            }
        });
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        });

        // Top icons
        document.getElementById('searchIcon').addEventListener('click', () => {
            const q = prompt("Search videos:");
            if (q) {
                const results = allVideos.filter(v => v.title.toLowerCase().includes(q.toLowerCase()));
                alert(`Found ${results.length} results: ${results.map(v=>v.title).join(", ")}`);
            }
        });
        document.getElementById('notifIcon').addEventListener('click', () => {
            if (notifications.length === 0) alert("No notifications.");
            else alert("Notifications:\n" + notifications.join("\n"));
        });
        document.getElementById('profileIcon').addEventListener('click', () => showPage('profile'));
        document.getElementById('viewAllBtn').addEventListener('click', () => showPage('explore'));

        // Close modals on overlay click
        document.querySelectorAll('.modal').forEach(m => {
            m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('active'); });
        });
    }
</script>
</body>
</html>
