<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTOM | Debug Write</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; max-width: 500px; margin: auto; }
        input, button { display: block; width: 100%; margin: 0.5rem 0; padding: 0.75rem; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h2>Signup Test</h2>
    <form id="signupForm">
        <input type="text" id="firstName" placeholder="First name" required>
        <input type="text" id="lastName" placeholder="Last name" required>
        <input type="tel" id="phone" placeholder="Phone" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password (min 6 chars)" required>
        <button type="submit">Register & Write to DB</button>
    </form>
    <div id="message"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getDatabase, ref, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHiQHbATgnQIIB9X-gOM5XdmRbOsUJoBQ",
            authDomain: "utom-c4003.firebaseapp.com",
            databaseURL: "https://utom-c4003-default-rtdb.firebaseio.com",
            projectId: "utom-c4003",
            storageBucket: "utom-c4003.firebasestorage.app",
            messagingSenderId: "878225874050",
            appId: "1:878225874050:web:643626906bfd233eeae89b",
            measurementId: "G-STHFWDKVZN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const form = document.getElementById('signupForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            messageDiv.innerHTML = '<span style="color:blue;">⏳ Creating account...</span>';

            try {
                // 1. Create Auth user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                console.log("Auth user created:", user.uid);

                // 2. Write to Realtime Database
                const userRef = ref(db, 'users/' + user.uid);
                await set(userRef, {
                    firstName,
                    lastName,
                    phone,
                    email,
                    wallet: 0,
                    enrolled: [],
                    liked: [],
                    createdAt: serverTimestamp(),
                    uid: user.uid
                });
                console.log("Database write successful");

                messageDiv.innerHTML = '<span class="success">✅ Success! User written to database.</span>';
                form.reset();
            } catch (error) {
                console.error("Full error object:", error);
                messageDiv.innerHTML = `<span class="error">❌ Error: ${error.message} (code: ${error.code})</span>`;
            }
        });
    </script>
</body>
</html>
