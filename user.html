<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>UTOM | Secure Access</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .logo-area {
            text-align: center;
            animation: fadeSlideDown 0.5s ease-out;
            width: 100%;
        }

        .logo-img {
            max-width: 200px;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: none;
            transition: none;
            pointer-events: none;
        }

        .logo-placeholder {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #000 30%, #F5B042 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .form-card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0,0,0,0.02);
            width: 100%;
            padding: 1.8rem 1.5rem 2rem;
            transition: all 0.2s ease;
            animation: fadeSlideDown 0.4s ease-out;
        }

        .form-panel {
            transition: opacity 0.2s ease;
        }

        .hidden-panel {
            display: none;
        }

        .input-icon-group {
            position: relative;
            width: 100%;
            margin-bottom: 1.2rem;
        }

        .input-icon-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 1.1rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .pill-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            font-size: 1rem;
            border: 1.5px solid #e9e9ef;
            border-radius: 999px;
            background: #ffffff;
            outline: none;
            transition: all 0.2s ease;
            color: #111;
            font-weight: 500;
        }

        .pill-input:focus {
            border-color: #F5B042;
            box-shadow: 0 0 0 3px rgba(245, 176, 66, 0.2);
        }

        .pill-input:focus + i {
            color: #F5B042;
        }

        .double-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .double-row .input-icon-group {
            flex: 1;
            min-width: 120px;
        }

        .btn-yellow-black {
            background: #F5B042;
            border: none;
            color: #000000;
            font-weight: 700;
            font-size: 1rem;
            padding: 14px 20px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-yellow-black:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
            background: #ffb84d;
        }

        .btn-yellow-black:active {
            transform: translateY(1px);
        }

        .btn-yellow-black:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-outline-dark {
            background: transparent;
            border: 2px solid #000000;
            color: #000;
            box-shadow: none;
        }

        .btn-outline-dark:hover {
            background: #00000008;
            transform: translateY(-2px);
        }

        .text-link {
            background: none;
            border: none;
            color: #000;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.85rem;
            transition: color 0.2s;
            padding: 6px 10px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .text-link i {
            font-size: 0.8rem;
        }

        .text-link:hover {
            color: #F5B042;
            text-decoration: none;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            flex-wrap: wrap;
            gap: 12px;
        }

        .terms-check {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .terms-check label {
            font-size: 0.85rem;
            color: #2c2c2c;
            font-weight: 500;
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            accent-color: #F5B042;
            cursor: pointer;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
            padding: 1rem;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: white;
            max-width: 440px;
            width: 100%;
            border-radius: 44px;
            padding: 1.8rem;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2);
            transform: scale(0.96);
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .modal-overlay.active .modal-container {
            transform: scale(1);
        }

        .modal-container h3 {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-container p {
            color: #5a5a5a;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 1.2rem;
        }

        .modal-buttons button {
            flex: 1;
        }

        .error-msg {
            color: #d9534f;
            font-size: 0.75rem;
            margin-left: 20px;
            margin-top: 2px;
            min-height: 18px;
        }

        .small-text {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.25rem;
            color: #7a7a7a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes fadeSlideDown {
            0% { opacity: 0; transform: translateY(-12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 500px) {
            body { padding: 0.8rem; align-items: flex-start; padding-top: 1.8rem; }
            .form-card { padding: 1.4rem 1.2rem 1.6rem; border-radius: 32px; }
            .btn-yellow-black { padding: 12px 16px; font-size: 0.95rem; }
            .logo-img { max-width: 150px; }
            .pill-input { padding: 12px 16px 12px 44px; font-size: 0.95rem; }
            .input-icon-group i { left: 16px; font-size: 1rem; }
            .modal-container { padding: 1.5rem; }
        }

        @media (max-width: 380px) {
            .flex-between { flex-direction: column; align-items: stretch; }
            .text-link { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="logo-area">
        <img src="logo.png" alt="UTOM official logo" class="logo-img" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'logo-placeholder\'><i class=\'fas fa-bolt\' style=\'margin-right:8px;\'></i>UTOM</div>';">
    </div>

    <div class="form-card">
        <!-- LOGIN FORM -->
        <div id="loginPanel" class="form-panel">
            <form id="loginForm">
                <div class="input-icon-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" class="pill-input" placeholder="Email address" autocomplete="email" required>
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" class="pill-input" placeholder="Password" autocomplete="current-password" required>
                </div>
                <div id="loginError" class="error-msg"></div>
                <button type="submit" class="btn-yellow-black" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> LOGIN</button>
                <div class="flex-between">
                    <button type="button" id="showSignupFromLoginBtn" class="btn-yellow-black btn-outline-dark" style="width: auto; padding: 10px 18px;"><i class="fas fa-user-plus"></i> CREATE ACCOUNT</button>
                    <button type="button" id="forgotPwdBtn" class="text-link"><i class="fas fa-key"></i> Forgot password?</button>
                </div>
            </form>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupPanel" class="form-panel hidden-panel">
            <form id="signupForm">
                <div class="double-row">
                    <div class="input-icon-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="firstName" class="pill-input" placeholder="First name" required>
                    </div>
                    <div class="input-icon-group">
                        <i class="fas fa-user-tag"></i>
                        <input type="text" id="lastName" class="pill-input" placeholder="Last name" required>
                    </div>
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-phone-alt"></i>
                    <input type="tel" id="phoneNumber" class="pill-input" placeholder="Phone number" required>
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" class="pill-input" placeholder="Email address" required>
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" class="pill-input" placeholder="Create password" required>
                </div>
                <div class="input-icon-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirmPassword" class="pill-input" placeholder="Confirm password" required>
                </div>
                <div id="signupError" class="error-msg"></div>
                <div class="terms-check">
                    <input type="checkbox" id="termsCheckbox" class="checkbox-custom">
                    <label for="termsCheckbox">I agree to the <strong>Terms & Conditions</strong> and Privacy Policy.</label>
                </div>
                <button type="submit" class="btn-yellow-black" id="registerBtn"><i class="fas fa-user-check"></i> REGISTER</button>
                <div class="flex-between" style="margin-top: 0.8rem;">
                    <button type="button" id="backToLoginBtn" class="text-link"><i class="fas fa-chevron-left"></i> Back to Login</button>
                </div>
            </form>
        </div>
    </div>
    <div class="small-text"><i class="fas fa-shield-alt"></i> secure & seamless · 24/7 support</div>
</div>

<!-- FORGOT PASSWORD MODAL -->
<div id="forgotModal" class="modal-overlay">
    <div class="modal-container">
        <h3><i class="fas fa-paper-plane" style="color:#F5B042;"></i> Reset password</h3>
        <p>Enter your email address and we'll send you a secure link to reset your password.</p>
        <div class="input-icon-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="resetEmailInput" class="pill-input" placeholder="Your email address" autocomplete="email">
        </div>
        <div id="resetError" class="error-msg"></div>
        <div class="modal-buttons">
            <button id="closeModalBtn" class="btn-yellow-black btn-outline-dark" style="background:transparent;"><i class="fas fa-times"></i> Cancel</button>
            <button id="sendResetLinkBtn" class="btn-yellow-black"><i class="fas fa-paper-plane"></i> Send link</button>
        </div>
    </div>
</div>

<script type="module">
    // ========== FIREBASE IMPORTS ==========
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getDatabase, ref, set, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    // Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDHiQHbATgnQIIB9X-gOM5XdmRbOsUJoBQ",
        authDomain: "utom-c4003.firebaseapp.com",
        databaseURL: "https://utom-c4003-default-rtdb.firebaseio.com",
        projectId: "utom-c4003",
        storageBucket: "utom-c4003.firebasestorage.app",
        messagingSenderId: "878225874050",
        appId: "1:878225874050:web:643626906bfd233eeae89b",
        measurementId: "G-STHFWDKVZN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ========== DOM ELEMENTS ==========
    const loginPanel = document.getElementById('loginPanel');
    const signupPanel = document.getElementById('signupPanel');
    const showSignupFromLogin = document.getElementById('showSignupFromLoginBtn');
    const backToLoginBtn = document.getElementById('backToLoginBtn');
    const forgotPwdBtn = document.getElementById('forgotPwdBtn');
    const forgotModal = document.getElementById('forgotModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const sendResetLinkBtn = document.getElementById('sendResetLinkBtn');
    const resetEmailInput = document.getElementById('resetEmailInput');
    const resetError = document.getElementById('resetError');
    
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const loginError = document.getElementById('loginError');
    const signupError = document.getElementById('signupError');

    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const firstNameInput = document.getElementById('firstName');
    const lastNameInput = document.getElementById('lastName');
    const phoneInput = document.getElementById('phoneNumber');
    const signupEmailInput = document.getElementById('signupEmail');
    const signupPasswordInput = document.getElementById('signupPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const termsCheckbox = document.getElementById('termsCheckbox');

    // ========== UI HELPERS ==========
    function showLoginPanel() {
        loginPanel.classList.remove('hidden-panel');
        signupPanel.classList.add('hidden-panel');
        clearErrors();
    }

    function showSignupPanel() {
        signupPanel.classList.remove('hidden-panel');
        loginPanel.classList.add('hidden-panel');
        clearErrors();
    }

    function clearErrors() {
        loginError.textContent = '';
        signupError.textContent = '';
        resetError.textContent = '';
    }

    function setLoading(button, isLoading) {
        if (isLoading) {
            button.disabled = true;
            const icon = button.querySelector('i');
            if (icon) icon.className = 'fas fa-spinner fa-spin';
        } else {
            button.disabled = false;
            const icon = button.querySelector('i');
            if (icon) {
                if (button.id === 'loginBtn') icon.className = 'fas fa-arrow-right-to-bracket';
                else if (button.id === 'registerBtn') icon.className = 'fas fa-user-check';
                else if (button.id === 'sendResetLinkBtn') icon.className = 'fas fa-paper-plane';
            }
        }
    }

    // Panel switching
    showSignupFromLogin.addEventListener('click', showSignupPanel);
    backToLoginBtn.addEventListener('click', showLoginPanel);

    // Modal controls
    function openForgotModal() {
        resetEmailInput.value = '';
        resetError.textContent = '';
        forgotModal.classList.add('active');
    }
    function closeForgotModal() {
        forgotModal.classList.remove('active');
    }
    forgotPwdBtn.addEventListener('click', openForgotModal);
    closeModalBtn.addEventListener('click', closeForgotModal);
    forgotModal.addEventListener('click', (e) => {
        if (e.target === forgotModal) closeForgotModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && forgotModal.classList.contains('active')) {
            closeForgotModal();
        }
    });

    // ========== LOGIN ==========
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();
        
        if (!email) { loginError.textContent = 'Please enter your email address.'; return; }
        if (!password) { loginError.textContent = 'Please enter your password.'; return; }
        if (!email.includes('@') || !email.includes('.')) {
            loginError.textContent = 'Please enter a valid email address.';
            return;
        }

        clearErrors();
        setLoading(loginBtn, true);

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            // Read user details from Realtime Database
            const userRef = ref(db, 'users/' + user.uid);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                const userData = snapshot.val();
                console.log('User data retrieved:', userData);
                sessionStorage.setItem('utom_user_email', user.email);
                sessionStorage.setItem('utom_user_uid', user.uid);
                sessionStorage.setItem('utom_user_name', `${userData.firstName} ${userData.lastName}`);
                sessionStorage.setItem('utom_user_phone', userData.phone);
                sessionStorage.setItem('utom_user_wallet', userData.wallet);
            } else {
                console.warn('No user data found in database for uid:', user.uid);
                sessionStorage.setItem('utom_user_email', user.email);
                sessionStorage.setItem('utom_user_uid', user.uid);
            }
            
            // Redirect based on email
            if (email === 'admin@utom.com') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'user.html';
            }
        } catch (error) {
            console.error('Login error:', error);
            let message = 'Login failed. Please try again.';
            if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                message = 'Invalid email or password.';
            } else if (error.code === 'auth/too-many-requests') {
                message = 'Too many attempts. Please try again later.';
            } else if (error.code === 'auth/invalid-email') {
                message = 'Invalid email format.';
            }
            loginError.textContent = message;
        } finally {
            setLoading(loginBtn, false);
        }
    });

    // ========== SIGNUP (writes to database, then redirects) ==========
    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const firstName = firstNameInput.value.trim();
        const lastName = lastNameInput.value.trim();
        const phone = phoneInput.value.trim();
        const email = signupEmailInput.value.trim();
        const password = signupPasswordInput.value;
        const confirm = confirmPasswordInput.value;
        const termsAccepted = termsCheckbox.checked;

        // Validation
        if (!firstName) { signupError.textContent = 'First name is required.'; return; }
        if (!lastName) { signupError.textContent = 'Last name is required.'; return; }
        if (!phone) { signupError.textContent = 'Phone number is required.'; return; }
        if (!email) { signupError.textContent = 'Email address is required.'; return; }
        if (!email.includes('@') || !email.includes('.')) { 
            signupError.textContent = 'Please enter a valid email.'; 
            return; 
        }
        if (email === 'admin@utom.com') { 
            signupError.textContent = 'This email is reserved for admin.'; 
            return; 
        }
        if (!password) { signupError.textContent = 'Please create a password.'; return; }
        if (password.length < 6) { 
            signupError.textContent = 'Password must be at least 6 characters.'; 
            return; 
        }
        if (password !== confirm) { 
            signupError.textContent = 'Passwords do not match.'; 
            return; 
        }
        if (!termsAccepted) { 
            signupError.textContent = 'You must accept the Terms & Conditions.'; 
            return; 
        }

        clearErrors();
        setLoading(registerBtn, true);

        try {
            // 1. Create auth user
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            // 2. Write complete user data to Realtime Database
            const userRef = ref(db, 'users/' + user.uid);
            await set(userRef, {
                firstName: firstName,
                lastName: lastName,
                phone: phone,
                email: email,
                wallet: 0,
                enrolled: [],
                liked: [],
                createdAt: serverTimestamp(),
                uid: user.uid
            });

            // 3. Store session info
            sessionStorage.setItem('utom_user_email', email);
            sessionStorage.setItem('utom_user_uid', user.uid);
            sessionStorage.setItem('utom_user_name', `${firstName} ${lastName}`);
            sessionStorage.setItem('utom_user_phone', phone);
            sessionStorage.setItem('utom_user_wallet', '0');

            // 4. Clear form (optional)
            firstNameInput.value = '';
            lastNameInput.value = '';
            phoneInput.value = '';
            signupEmailInput.value = '';
            signupPasswordInput.value = '';
            confirmPasswordInput.value = '';
            termsCheckbox.checked = false;

            // 5. Redirect to user page (database write is complete)
            window.location.href = 'user.html';
        } catch (error) {
            console.error('Signup error:', error);
            let message = 'Registration failed.';
            if (error.code === 'auth/email-already-in-use') {
                message = 'This email is already registered.';
            } else if (error.code === 'auth/weak-password') {
                message = 'Password is too weak.';
            } else if (error.code === 'auth/invalid-email') {
                message = 'Invalid email format.';
            }
            signupError.textContent = message;
            // If auth creation succeeded but DB write failed, the user may exist without data.
            // For simplicity, we show error and let user retry; you could also delete the auth user.
        } finally {
            setLoading(registerBtn, false);
        }
    });

    // ========== FORGOT PASSWORD ==========
    sendResetLinkBtn.addEventListener('click', async () => {
        const email = resetEmailInput.value.trim();
        if (!email) {
            resetError.textContent = 'Please enter your email address.';
            return;
        }
        if (!email.includes('@') || !email.includes('.')) {
            resetError.textContent = 'Please enter a valid email.';
            return;
        }

        clearErrors();
        setLoading(sendResetLinkBtn, true);
        try {
            await sendPasswordResetEmail(auth, email);
            alert(`Password reset link sent to ${email}. Check your inbox.`);
            closeForgotModal();
            loginEmail.value = email;
        } catch (error) {
            console.error('Reset error:', error);
            let message = 'Failed to send reset email.';
            if (error.code === 'auth/user-not-found') {
                message = 'No account found with this email.';
            } else if (error.code === 'auth/invalid-email') {
                message = 'Invalid email format.';
            }
            resetError.textContent = message;
        } finally {
            setLoading(sendResetLinkBtn, false);
        }
    });

    // ========== FIXED: On page load, check if user is already logged in, but DO NOT redirect on future auth changes ==========
    // Previously, an onAuthStateChanged listener caused premature redirect during signup.
    // Now we simply check the current user once and redirect if needed.
    // This does not interfere with the signup flow because it runs only once on load.
    if (auth.currentUser) {
        const user = auth.currentUser;
        if (user.email === 'admin@utom.com') {
            window.location.href = 'admin.html';
        } else {
            window.location.href = 'user.html';
        }
    }
</script>
</body>
</html>
